<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuizAI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #212121;
            color: #ececec;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background: #171717;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid #2f2f2f;
            transition: width 0.25s ease, opacity 0.2s ease;
            overflow: hidden;
        }

        #sidebar.closed { width: 0; opacity: 0; border-right: none; }

        #sidebar-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 12px 10px;
            flex-shrink: 0;
        }

        .star-sm {
            width: 16px; height: 16px;
            background: #8a2be2;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            flex-shrink: 0;
        }

        #sidebar-logo span { font-size: 0.9rem; font-weight: 600; color: #ececec; white-space: nowrap; }

        #sidebar-header { padding: 0 12px 10px; border-bottom: 1px solid #2f2f2f; flex-shrink: 0; }

        #new-chat-btn {
            width: 100%;
            padding: 9px 12px;
            background: transparent;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #ececec;
            font-family: inherit;
            font-size: 0.82rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        #new-chat-btn:hover { background: #2a2a2a; }
        #new-chat-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

        #chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        #chats-list::-webkit-scrollbar { width: 3px; }
        #chats-list::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }

        .chat-section-label {
            font-size: 0.65rem; color: #666;
            padding: 8px 8px 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .chat-item {
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .chat-item:hover { background: #2a2a2a; }
        .chat-item.active { background: #2f2f2f; color: #fff; }
        .chat-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .delete-btn {
            background: none; border: none; color: #666;
            cursor: pointer; padding: 2px 4px;
            border-radius: 4px; display: none;
            flex-shrink: 0; font-size: 12px; line-height: 1;
        }
        .chat-item:hover .delete-btn { display: block; }
        .delete-btn:hover { color: #f87171; }

        /* API KEY SCREEN */
        #api-screen {
            position: fixed;
            inset: 0;
            background: #212121;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 24px;
        }

        .api-box {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .api-box .api-star {
            width: 36px; height: 36px;
            background: #8a2be2;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            margin-bottom: 4px;
        }

        .api-box h2 { font-size: 1.1rem; font-weight: 600; }
        .api-box p { font-size: 0.82rem; color: #888; line-height: 1.6; }

        .api-box input {
            width: 100%;
            padding: 11px 14px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #ececec;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .api-box input:focus { border-color: #8a2be2; }
        .api-box input::placeholder { color: #555; }

        .api-box button {
            padding: 11px;
            background: #8a2be2;
            border: none;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .api-box button:hover { background: #9932cc; }

        .api-error { font-size: 0.78rem; color: #f87171; display: none; }

        /* MAIN */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 13px 20px;
            background: #212121;
            border-bottom: 1px solid #2f2f2f;
            position: relative;
            flex-shrink: 0;
        }

        #toggle-sidebar {
            position: absolute; left: 14px;
            background: none; border: none; color: #888;
            cursor: pointer; padding: 5px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, color 0.15s;
        }
        #toggle-sidebar:hover { background: #2a2a2a; color: #fff; }
        #toggle-sidebar svg { width: 18px; height: 18px; }

        .logo-wrap { display: flex; align-items: center; gap: 8px; }

        .star-icon {
            width: 17px; height: 17px;
            background: #8a2be2;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        header h1 { font-size: 0.93rem; font-weight: 600; color: #ececec; }

        .header-right {
            position: absolute; right: 14px;
            display: flex; align-items: center; gap: 10px;
        }

        #status-dot {
            width: 7px; height: 7px;
            border-radius: 50%; background: #4ade80;
            box-shadow: 0 0 6px #4ade8088;
        }
        #status-dot.thinking { background: #8a2be2; box-shadow: 0 0 8px #8a2be288; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        #status-label { font-size: 0.7rem; color: #777; }

        #change-key-btn {
            background: none; border: none; color: #555;
            cursor: pointer; font-size: 0.68rem; font-family: inherit;
            transition: color 0.15s;
        }
        #change-key-btn:hover { color: #aaa; }

        #chat {
            flex: 1; overflow-y: auto;
            padding: 32px 0 16px;
            display: flex; flex-direction: column;
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }

        #welcome {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex: 1; gap: 12px;
            user-select: none; pointer-events: none;
        }

        .big-star {
            width: 40px; height: 40px;
            background: #8a2be2;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0.35;
        }

        #welcome p { font-size: 0.88rem; color: #555; }

        .msg-row { width: 100%; padding: 6px 0; animation: fadeUp 0.2s ease; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-inner {
            max-width: 720px; margin: 0 auto;
            padding: 0 24px;
            display: flex; gap: 14px; align-items: flex-start;
        }

        .avatar {
            width: 28px; height: 28px;
            border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700; margin-top: 2px;
        }

        .user-av { background: #4a4a4a; color: #ccc; }
        .ai-av   { background: #8a2be2; color: white; }

        .mini-star {
            width: 13px; height: 13px;
            background: white;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .msg-content { flex: 1; padding-top: 3px; }
        .msg-name { font-size: 0.72rem; font-weight: 600; color: #888; margin-bottom: 5px; }
        .msg-text { font-size: 0.9rem; line-height: 1.75; color: #ececec; white-space: pre-wrap; word-break: break-word; }
        .msg-row.error .msg-text { color: #fca5a5; }

        .typing-dots span {
            display: inline-block; width: 5px; height: 5px;
            border-radius: 50%; background: #8a2be2;
            margin: 0 2px; animation: bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

        #input-wrap { padding: 12px 24px 22px; background: #212121; flex-shrink: 0; }

        #input-box {
            max-width: 720px; margin: 0 auto;
            background: #2f2f2f;
            border: 1px solid #3a3a3a;
            border-radius: 14px;
            display: flex; align-items: flex-end;
            gap: 8px; padding: 10px 10px 10px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #input-box:focus-within {
            border-color: #555;
            box-shadow: 0 0 0 3px rgba(138,43,226,0.12);
        }

        #prompt {
            flex: 1; background: transparent;
            border: none; outline: none;
            color: #ececec; font-family: inherit;
            font-size: 0.9rem; resize: none;
            max-height: 160px; line-height: 1.6; padding: 2px 0;
        }
        #prompt::placeholder { color: #666; }

        #send-btn {
            width: 32px; height: 32px;
            border-radius: 8px; border: none;
            background: #8a2be2; color: white;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.2s, transform 0.1s;
        }
        #send-btn:hover { background: #9932cc; }
        #send-btn:active { transform: scale(0.93); }
        #send-btn:disabled { background: #3a2060; cursor: not-allowed; }

        .hint {
            max-width: 720px; margin: 7px auto 0;
            text-align: center; font-size: 0.67rem; color: #4a4a4a;
        }

        #overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 10;
        }

        @media (max-width: 600px) {
            #sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 20; width: 260px; }
            #sidebar.closed { width: 0; }
            #overlay.visible { display: block; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
    <div id="sidebar-logo">
        <div class="star-sm"></div>
        <span>LuizAI</span>
    </div>
    <div id="sidebar-header">
        <button id="new-chat-btn" onclick="newChat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Nova conversa
        </button>
    </div>
    <div id="chats-list"></div>
</div>

<!-- MAIN -->
<div id="main">
    <header>
        <button id="toggle-sidebar" onclick="toggleSidebar()" title="Conversas">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <div class="logo-wrap">
            <div class="star-icon"></div>
            <h1>LuizAI</h1>
        </div>
        <div class="header-right">
            <div id="status-dot"></div>
            <span id="status-label">online</span>
        </div>
    </header>

    <div id="chat">
        <div id="welcome">
            <div class="big-star"></div>
            <p>Como posso ajudar?</p>
        </div>
    </div>

    <div id="input-wrap">
        <div id="input-box">
            <textarea id="prompt" placeholder="Mensagem para LuizAI..." rows="1"></textarea>
            <button id="send-btn" onclick="send()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                </svg>
            </button>
        </div>
        <p class="hint">Enter para enviar &nbsp;·&nbsp; Shift+Enter para nova linha</p>
    </div>
</div>

<script>
    const chatEl = document.getElementById('chat');
    const input = document.getElementById('prompt');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const statusLabel = document.getElementById('status-label');
    const chatsList = document.getElementById('chats-list');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    let isThinking = false;
    let currentChatId = null;
    let chats = {};
    let sidebarOpen = true;

    const SYSTEM_PROMPT = `Você é o LuizAI, criado pelo Luiz. Apenas o Luiz, uma pessoa só, não empresa nenhuma. Responda qualquer assunto de forma simpática e direta em português brasileiro informal. Quando pedido, escreva códigos e scripts completos e funcionais.

Quando o usuário pedir para gerar, criar ou desenhar uma imagem, responda APENAS neste formato:
[IMAGEM: descrição detalhada em inglês do que foi pedido]

Exemplo: se pedirem "gera uma imagem de um gato", responda apenas: [IMAGEM: a cute cat sitting on a wooden floor, realistic photo]`;

    // SIDEBAR
    function toggleSidebar() {
        sidebarOpen = !sidebarOpen;
        sidebar.classList.toggle('closed', !sidebarOpen);
        overlay.classList.toggle('visible', sidebarOpen && window.innerWidth <= 600);
    }

    function closeSidebar() {
        sidebarOpen = false;
        sidebar.classList.add('closed');
        overlay.classList.remove('visible');
    }

    // CHATS
    function loadStorage() {
        const saved = localStorage.getItem('luizai_chats');
        if (saved) chats = JSON.parse(saved);
    }

    function saveStorage() {
        localStorage.setItem('luizai_chats', JSON.stringify(chats));
    }

    function genId() { return 'chat_' + Date.now(); }

    function newChat() {
        const id = genId();
        chats[id] = { title: 'Nova conversa', messages: [], createdAt: Date.now() };
        saveStorage();
        openChat(id);
        renderSidebar();
        if (window.innerWidth <= 600) closeSidebar();
    }

    function openChat(id) {
        currentChatId = id;
        renderSidebar();
        renderChat();
        input.focus();
        if (window.innerWidth <= 600) closeSidebar();
    }

    function deleteChat(id) {
        delete chats[id];
        saveStorage();
        if (currentChatId === id) { currentChatId = null; renderChat(); }
        renderSidebar();
    }

    function renderSidebar() {
        chatsList.innerHTML = '';
        const ids = Object.keys(chats).sort((a, b) => chats[b].createdAt - chats[a].createdAt);
        if (ids.length === 0) return;

        const label = document.createElement('div');
        label.className = 'chat-section-label';
        label.textContent = 'Conversas';
        chatsList.appendChild(label);

        ids.forEach(id => {
            const item = document.createElement('div');
            item.className = 'chat-item' + (id === currentChatId ? ' active' : '');

            const title = document.createElement('span');
            title.className = 'chat-item-title';
            title.textContent = chats[id].title;

            const del = document.createElement('button');
            del.className = 'delete-btn';
            del.innerHTML = '✕';
            del.title = 'Apagar';
            del.onclick = (e) => { e.stopPropagation(); deleteChat(id); };

            item.appendChild(title);
            item.appendChild(del);
            item.onclick = () => openChat(id);
            chatsList.appendChild(item);
        });
    }

    function renderChat() {
        chatEl.innerHTML = '';
        if (!currentChatId || !chats[currentChatId] || chats[currentChatId].messages.length === 0) {
            const w = document.createElement('div');
            w.id = 'welcome';
            w.innerHTML = '<div class="big-star"></div><p>Como posso ajudar?</p>';
            chatEl.appendChild(w);
            return;
        }
        chats[currentChatId].messages.forEach(m => addMessageToDOM(m.text, m.role, m.isError || false, false));
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function escapeHtml(t) {
        return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderMessage(text) {
        // Check for image tag
        const imgMatch = text.match(/\[IMAGEM:\s*(.+?)\]/);
        if (imgMatch) {
            const prompt = encodeURIComponent(imgMatch[1].trim().replace(/['"]/g, ''));
            const url = `https://image.pollinations.ai/prompt/${prompt}?width=512&height=512&nologo=true&seed=${Math.floor(Math.random()*9999)}`;
            return `<img src="${url}" alt="Imagem gerada" style="max-width:100%;border-radius:10px;margin-top:6px;" onerror="this.outerHTML='<span style=color:#f87171>❌ Erro ao gerar imagem. Tente novamente.</span>'">`;
        }

        // Render code blocks with copy button
        let html = escapeHtml(text);
        html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
            const id = 'code_' + Math.random().toString(36).slice(2);
            return `<div style="position:relative;margin:8px 0">
                <div style="background:#1a1a1a;border:1px solid #333;border-radius:8px;overflow:hidden">
                    ${lang ? `<div style="padding:4px 12px;font-size:0.7rem;color:#888;border-bottom:1px solid #333">${lang}</div>` : ''}
                    <pre id="${id}" style="margin:0;padding:12px;overflow-x:auto;font-size:0.82rem;line-height:1.6;font-family:monospace">${code.trim()}</pre>
                </div>
                <button onclick="copyCode('${id}')" style="position:absolute;top:6px;right:6px;background:#2f2f2f;borde
